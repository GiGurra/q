name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          check-latest: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      # Library + scanner/rewriter unit tests run without toolexec.
      # The internal/preprocessor harness (TestFixtures, TestLinkGate…)
      # builds cmd/q itself in TestMain and manages its own GOCACHE,
      # so it doesn't need GOFLAGS=-toolexec=q from the surrounding shell.
      - name: Run unit tests (no toolexec)
        run: go test ./internal/... ./pkg/...

      - name: Run unit tests with -race
        run: go test -race ./internal/... ./pkg/...

      - name: Install q binary
        run: go install ./cmd/q/

      - name: Smoke-build example with -toolexec=q
        run: |
          # Dedicated GOCACHE so the toolexec build never reuses a
          # stub-less pkg/q.a from the unrelated test runs above.
          GOCACHE="$HOME/.cache/q-build" go clean -cache
          GOFLAGS="-toolexec=q" GOCACHE="$HOME/.cache/q-build" go build ./example/...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Generate version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          IFS='.' read -r major minor patch <<< "${LATEST_TAG/v/}"
          NEW_VERSION="v$major.$minor.$((patch+1))"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Creating new version: $NEW_VERSION"

      - name: Create tag
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag -a ${{ steps.version.outputs.new_version }} -m "Release ${{ steps.version.outputs.new_version }}"
          git push origin ${{ steps.version.outputs.new_version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: Release ${{ steps.version.outputs.new_version }}
          generate_release_notes: true
