name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          check-latest: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      # Pure library + scanner/rewriter unit tests, no toolexec.
      - name: Run pkg + scanner/rewriter unit tests
        run: go test ./pkg/... ./internal/preprocessor/ -run '^Test[^F]' -count=1

      - name: Run pkg + scanner/rewriter unit tests with -race
        run: go test -race ./pkg/... ./internal/preprocessor/ -run '^Test[^F]' -count=1

      # The full e2e fixture suite + the link-gate negative test.
      # TestMain in internal/preprocessor builds cmd/q into a tempdir
      # and TestFixtures runs every fixture through `go build
      # -toolexec=<that-binary>` (and `go run` when expected_run.txt
      # is present). The harness owns its own GOCACHE so it can't
      # cross-contaminate with the unit tests above.
      - name: Run e2e fixtures + link-gate negative test
        run: go test ./internal/preprocessor/ -run '^TestFixtures$|^TestLinkGate' -v -count=1

      - name: Install q binary
        run: go install ./cmd/q/

      - name: Smoke-build example with -toolexec=q
        run: |
          # Dedicated GOCACHE so the toolexec build never reuses a
          # stub-less pkg/q.a from the unrelated test runs above.
          GOCACHE="$HOME/.cache/q-build" go clean -cache
          # `-tags=q_sealed_demo` opts in example/sealed, which is
          # build-tag-gated because its pre-rewrite source uses
          # synthesised marker methods plain Go can't typecheck.
          GOFLAGS="-toolexec=q -tags=q_sealed_demo" GOCACHE="$HOME/.cache/q-build" go build ./example/...
