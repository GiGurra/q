site_name: q
site_url: https://gigurra.github.io/q/
site_description: Go wild with Q — the funkiest -toolexec preprocessor. Rejected Go language proposals plus a playground of helpers the language committee didn't ship.
repo_url: https://github.com/GiGurra/q
repo_name: GiGurra/q

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

# nav: one entry per docs page, sorted case-insensitively by label.
# `scripts/docs_navbar_check.sh` enforces all three invariants:
#   - alphabetical order (case-insensitive)
#   - no two entries point at the same .md file (dedup)
#   - every exported `pkg/q` (+ subpackage) func / type is mentioned
#     by name in some docs page (completeness)
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API:
    - either.Either: api/either.md
    - q.As: api/as.md
    - q.Assemble: api/assemble.md
    - q.Async: api/async.md
    - q.At: api/at.md
    - q.AtCompileTime: api/atcompiletime.md
    - q.Atom: api/atom.md
    - q.AwaitAll / q.AwaitAny: api/await_multi.md
    - q.AwaitCtx: api/await_ctx.md
    - q.Check: api/check.md
    - q.CheckCtx: api/checkctx.md
    - q.Coro: api/coro.md
    - q.DebugPrintln: api/debug.md
    - q.EnumValues: api/enums.md
    - q.Exhaustive: api/exhaustive.md
    - q.F / q.Ferr / q.Fln: api/format.md
    - q.Fields / q.TypeName / q.Tag: api/reflection.md
    - q.FnParams / q.ValidatedStruct: api/fnparams.md
    - q.Generator / q.Yield: api/generator.md
    - q.GenStringer / q.GenEnumJSON: api/gen.md
    - q.GoroutineID: api/goroutine_id.md
    - q.Lazy: api/lazy.md
    - q.Lock: api/lock.md
    - q.Map / q.Filter / q.Fold: api/data.md
    - q.Match: api/match.md
    - q.NotNil: api/notnil.md
    - q.Ok: api/ok.md
    - q.OneOfN / q.AsOneOf: api/oneof.md
    - q.Open: api/open.md
    - q.ParMap / q.WithPar: api/par.md
    - q.Recover: api/recover.md
    - q.Recv: api/recv.md
    - q.RecvAny / q.Drain: api/channel_multi.md
    - q.RecvCtx: api/recv_ctx.md
    - q.Require: api/require.md
    - q.Scope: api/scope.md
    - q.Sealed: api/sealed.md
    - q.SlogAttr / q.SlogCtx: api/slog.md
    - q.Snake / q.Camel / q.Pascal: api/string_case.md
    - q.SQL / q.PgSQL / q.NamedSQL: api/sql.md
    - q.Tern: api/tern.md
    - q.Timeout / q.Deadline: api/timeout.md
    - q.TODO / q.Unreachable: api/todo.md
    - q.Trace: api/trace.md
    - q.Try / q.TryE / q.Unwrap: api/try.md
  - Why builds fail on `*MyErr` returns: typed-nil-guard.md
  - Design: design.md
