site_name: q
site_url: https://gigurra.github.io/q/
site_description: The question-mark operator for Go, delivered as a -toolexec preprocessor
repo_url: https://github.com/GiGurra/q
repo_name: GiGurra/q

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API:
    - Error bubbling:
      - q.Try:    api/try.md
      - q.NotNil: api/notnil.md
      - q.Check:  api/check.md
      - q.Open:   api/open.md
      - q.Trace:  api/trace.md
    - Comma-ok:
      - q.Ok:   api/ok.md
      - q.Recv: api/recv.md
      - q.As:   api/as.md
    - Fallback:
      - q.Default: api/default.md
    - Panic handling:
      - q.Recover:  api/recover.md
      - q.TryCatch: api/trycatch.md
    - Concurrency:
      - q.Go:    api/go.md
      - q.Lock:  api/lock.md
      - q.Async: api/async.md
    - Dev tools:
      - q.Debug:  api/debug.md
      - q.TODO:   api/todo.md
      - q.Assert: api/assert.md
  - Examples:
    - Basic bubbling: examples/basic.md
    - Error shaping:  examples/error-shaping.md
    - Resources:      examples/resources.md
  - Typed-nil guard: typed-nil-guard.md
  - Design: design.md
