site_name: q
site_url: https://gigurra.github.io/q/
site_description: Go wild with Q — the funkiest -toolexec preprocessor. Rejected Go language proposals plus a playground of helpers the language committee didn't ship.
repo_url: https://github.com/GiGurra/q
repo_name: GiGurra/q

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API:
    - q.A / q.AtomOf (typed-string atoms): api/atom.md
    - q.At (nested-nil safe traversal): api/at.md
    - q.AtCompileTime / AtCompileTimeCode (compile-time evaluation + macros): api/atcompiletime.md
    - q.Assemble (auto-derived DI): api/assemble.md
    - q.As:                    api/as.md
    - q.Async:                 api/async.md
    - q.AwaitAll / AwaitAny:   api/await_multi.md
    - q.AwaitCtx:              api/await_ctx.md
    - q.Coro (coroutines):     api/coro.md
    - q.Generator / q.Yield (iter.Seq sugar): api/generator.md
    - q.Map / Filter / Fold / Reduce (functional data ops): api/data.md
    - q.ParMap / ParFilter / WithPar (parallel data ops): api/par.md
    - q.CheckCtx:              api/checkctx.md
    - q.Check:                 api/check.md
    - q.DebugPrintln / SlogAttr: api/debug.md
    - q.EnumValues / Name / Parse / Valid / Ordinal: api/enums.md
    - q.Exhaustive (compile-time switch coverage): api/exhaustive.md
    - q.GenStringer / GenEnumJSON (method generators): api/gen.md
    - q.Fields / TypeName / Tag (compile-time reflection): api/reflection.md
    - q.FnParams / ValidatedStruct (required-by-default literals): api/fnparams.md
    - q.Match / Case / Default (value-returning switch): api/match.md
    - q.OneOfN / AsOneOf / OnType (discriminated sum types): api/oneof.md
    - q.Sealed (interface-based sealed sums for messages): api/sealed.md
    - either.Either / Left / Right / Fold (Scala-flavoured 2-arm sum): api/either.md
    - q.Tern (conditional expression):  api/tern.md
    - q.F / q.Ferr / q.Fln (string interpolation): api/format.md
    - q.SQL / q.PgSQL / q.NamedSQL (injection-safe SQL): api/sql.md
    - q.Upper / Lower / Snake / Kebab / Camel / Pascal / Title (compile-time string case): api/string_case.md
    - q.GoroutineID:           api/goroutine_id.md
    - q.Lazy (deferred eval):  api/lazy.md
    - q.Lock:                  api/lock.md
    - q.NotNil:                api/notnil.md
    - q.Ok:                    api/ok.md
    - q.Open:                  api/open.md
    - q.Recover:               api/recover.md
    - q.Recv:                  api/recv.md
    - q.RecvAny / Drain:       api/channel_multi.md
    - q.RecvCtx:               api/recv_ctx.md
    - q.Require:               api/require.md
    - q.Slog* / SlogCtx / File / Line / Expr: api/slog.md
    - q.Timeout / Deadline:    api/timeout.md
    - q.TODO / Unreachable:    api/todo.md
    - q.Trace:                 api/trace.md
    - q.Try:                   api/try.md
  - Why builds fail on `*MyErr` returns: typed-nil-guard.md
  - Design: design.md
