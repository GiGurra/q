site_name: q
site_url: https://gigurra.github.io/q/
site_description: Go wild with Q — the funkiest -toolexec preprocessor. Rejected Go language proposals plus a playground of helpers the language committee didn't ship.
repo_url: https://github.com/GiGurra/q
repo_name: GiGurra/q

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

# nav: alphabetised, one entry per exported `q.<Name>` (and per
# `<subpkg>.<Name>` for subpackages like `either`). Many-to-one is
# fine — multiple entries can link to the same docs page (e.g.
# q.Try and q.TryE both point at api/try.md). The flat shape lets
# `scripts/docs_navbar_check.sh` diff the navbar against the actual
# exported surface — any drift surfaces as a missing or stale entry.
