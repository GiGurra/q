site_name: q
site_url: https://gigurra.github.io/q/
site_description: Go wild with Q — the funkiest -toolexec preprocessor. Rejected Go language proposals plus a playground of helpers the language committee didn't ship.
repo_url: https://github.com/GiGurra/q
repo_name: GiGurra/q

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

# nav: one entry per docs page, sorted case-insensitively. Labels are
# short (1-3 words) descriptions of what the page covers — no func
# names. Per-function entries with #anchor disambiguators caused
# rendering collisions in mkdocs-material; one-page-one-entry sidesteps
# that and keeps the sidebar scannable. scripts/docs_navbar_check.sh
# enforces the one-to-one mapping plus alphabetical order.
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API:
    - Atoms: api/atom.md
    - Await (ctx): api/await_ctx.md
    - Await fan-in: api/await_multi.md
    - Channel fan-in: api/channel_multi.md
    - Channel recv: api/recv.md
    - Comptime: api/atcompiletime.md
    - Coroutines: api/coro.md
    - Ctx checkpoint: api/checkctx.md
    - Debug print: api/debug.md
    - Dependency injection: api/assemble.md
    - Either: api/either.md
    - Enum helpers: api/enums.md
    - Error check: api/check.md
    - Error trace: api/trace.md
    - Exhaustive switch: api/exhaustive.md
    - Futures: api/async.md
    - Generators: api/generator.md
    - Goroutine ID: api/goroutine_id.md
    - Interpolation: api/format.md
    - Lazy values: api/lazy.md
    - Lifetime scope: api/scope.md
    - Match expression: api/match.md
    - Method codegen: api/gen.md
    - Mutex sugar: api/lock.md
    - Nil bubble: api/notnil.md
    - Ok bubble: api/ok.md
    - Optional chain: api/at.md
    - Panic recover: api/recover.md
    - Parallel ops: api/par.md
    - Preconditions: api/require.md
    - Recv (ctx): api/recv_ctx.md
    - Reflection: api/reflection.md
    - Required fields: api/fnparams.md
    - Resource open: api/open.md
    - Slice ops: api/data.md
    - Slog attrs: api/slog.md
    - SQL builder: api/sql.md
    - String case: api/string_case.md
    - Struct convert: api/convert.md
    - Sum (interface): api/sealed.md
    - Sum (struct): api/oneof.md
    - Ternary: api/tern.md
    - Timeout: api/timeout.md
    - TODO marker: api/todo.md
    - Try: api/try.md
    - Type assert: api/as.md
  - Typed-nil guard: typed-nil-guard.md
  - Design: design.md
