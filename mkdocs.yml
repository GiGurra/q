site_name: q
site_url: https://gigurra.github.io/q/
site_description: Go wild with Q — the funkiest -toolexec preprocessor. Rejected Go language proposals plus a playground of helpers the language committee didn't ship.
repo_url: https://github.com/GiGurra/q
repo_name: GiGurra/q

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

# nav: every exported pkg/q (and pkg/q/either) function gets
# its own navbar entry. The only collapsing is `Foo` + `FooE`
# pairs into a single `Foo / FooE` entry. Multiple entries
# pointing at the same docs page is fine — `q.Try / q.TryE`,
# `q.Map`, `q.Filter`, etc. all link to their family doc.
# scripts/docs_navbar_check.sh enforces both invariants.
