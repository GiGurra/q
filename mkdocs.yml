site_name: q
site_url: https://gigurra.github.io/q/
site_description: The question-mark operator for Go, delivered as a -toolexec preprocessor
repo_url: https://github.com/GiGurra/q
repo_name: GiGurra/q

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API:
    - q.Try:    api/try.md
    - q.NotNil: api/notnil.md
    - q.Check:  api/check.md
    - q.Open:   api/open.md
  - Examples:
    - Basic bubbling: examples/basic.md
    - Error shaping:  examples/error-shaping.md
    - Resources:      examples/resources.md
  - Design: design.md
